# Source: https://github.com/tibuntu/homeassistant-kubernetes/blob/main/manifests/full/clusterrole.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homeassistant-kubernetes-integration
  labels:
    app.kubernetes.io/name: homeassistant-kubernetes-integration
    app.kubernetes.io/component: rbac
rules:
  # Core resources - monitoring + watch + pod deletion
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  # Apps resources - monitoring + watch
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]

  # Apps resources - rollout restart
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch"]

  # Apps resources - scaling control
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale", "statefulsets/status"]
    verbs: ["get", "patch", "update"]

  # Batch resources - monitoring + watch + cronjob triggering
  - apiGroups: ["batch"]
    resources: ["cronjobs", "cronjobs/status", "jobs"]
    verbs: ["get", "list", "watch", "patch", "update", "create"]

  # Metrics API - real-time CPU and memory usage (requires metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
