apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
  labels:
    app.kubernetes.io/name: sonarr
    app.kubernetes.io/instance: sonarr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarr
      app.kubernetes.io/instance: sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarr
        app.kubernetes.io/instance: sonarr
    spec:
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17
          ports:
            - name: http
              containerPort: 8989
              protocol: TCP
          env:
            - name: PUID
              value: "1029"  # service-access user on Graham-DS920 NFS server
            - name: PGID
              value: "100"   # users group on Graham-DS920 NFS server
            - name: TZ
              value: "America/Toronto"
            - name: DOCKER_MODS
              value: "ghcr.io/themepark-dev/theme.park:sonarr"
            - name: TP_THEME
              value: "nord"
          volumeMounts:
            - mountPath: /config
              name: sonarr-config
            - mountPath: /data
              name: media
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            initialDelaySeconds: 10
            tcpSocket:
              port: http
          readinessProbe:
            initialDelaySeconds: 10
            tcpSocket:
              port: http

      volumes:
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config
        # Mount the entire media share so sonarr can hard link
        # from /data/torrents/ to /data/media/tv/
        - name: media
          nfs:
            server: ds920.hoyes.dev
            path: /volume1/media
